<body class="geist bg-gray-100">
  <header>
    <div
      class="flex flex-col items-start md:items-center space-y-6 justify-center md:flex-row navbar bg-base-100 shadow-sm px-10">
      <div class="navbar-start">
        <a class="btn btn-ghost text-xl">
          <img class="w-13" src="./assets/github-logo.png" alt="Logo" />
          GitHub Issues Tracker
        </a>
      </div>

      <div class="navbar-end flex flex-row w-full gap-2">

        <label class="input w-full md:w-auto">
          <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>

          <input id="input-search" type="search" class="w-full" required placeholder="Search Issues..." />
        </label>

        <a id="btn-search" class="btn btn-primary  md:w-auto">
          + New Issue
        </a>

      </div>
    </div>
  </header>

  <!-- Banner Section-01 -->
  <section class="w-11/12 md:w-9/12 bg-white mx-auto mt-2 md:mt-12 mb-4 py-5 px-2 md:p-6 space-x-2 rounded-md">
    <button id="btn-all" class="btn btn-primary w-25">All</button>
    <button id="btn-open" class="btn w-25">Open</button>
    <button id="btn-closed" class="btn w-25">Closed</button>
  </section>

  <!-- Banner Section-02 -->
  <section
    class="w-11/12 md:w-9/12 bg-white mx-auto flex items-start flex-col md:flex-row md:justify-between md:items-center p-6 rounded-md space-y-3">
    <div id="issue-left" class="flex justify-between items-center space-x-2">

      <div class="flex items-center gap-5">
        <div class="bg-purple-50 w-10 h-10 rounded-full p-2">
          <img src="./assets/Aperture.png" alt="" />
        </div>
        <div>
          <h2 class="font-semibold text-xl">
            <span id="issue-number">0</span> Issues
          </h2>
          <p class="text-gray-400">Track and manage your project issues</p>
        </div>
      </div>

    </div>

    <div id="issue-right" class="flex justify-start md:justify-between items-center space-x-4">
      <div class="flex justify-between items-center space-x-1">
        <span class="text-green-500"><i class="fa-solid fa-circle"></i></span>
        <p class="font-medium text-[16px]">Open</p>
      </div>
      <div class="flex justify-between items-center space-x-1">
        <span class="text-purple-500"><i class="fa-solid fa-circle"></i></span>
        <p class="font-medium text-[16px]">Closed</p>
      </div>
    </div>

  </section>

  <!-- Main Section -->
  <main class="w-11/12 md:w-9/12 bg-[#FBFBFB] mx-auto p-2 md:p-6 mt-2 rounded-md">
    <!-- Card Container -->
    <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 space-x-4 space-y-4">
