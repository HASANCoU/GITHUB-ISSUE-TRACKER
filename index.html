<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="style.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- DaisyUI + Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body class="geist bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md bg-white shadow-xl p-8">
      <div class="max-w-50 mx-auto">
        <img class="mx-auto" src="./assets/github-logo.png" alt="Github Logo" />
      </div>

      <h1 class="font-semibold text-2xl text-neutral text-center">
        GitHub Issues Tracker
      </h1>
      <p class="text-gray-400 text-center">Sign in to manage your issues</p>

      <div class="w-full">
        <fieldset class="fieldset mb-2">
          <legend class="fieldset-legend">Username</legend>
          <input
            id="username"
            type="text"
            class="input btn-block"
            placeholder="Enter Username"
            required
          />
          <legend class="fieldset-legend">Password</legend>
          <input
            id="password"
            type="password"
            class="input btn-block"
            placeholder="Enter Password"
            required
          />
        </fieldset>
        <button id="signin-btn" class="btn btn-primary btn-block">Signin</button>
      </div>
      <div class="flex items-center my-4">
        <hr class="flex-grow border-gray-300" />
        <span class="px-3 text-gray-500">OR</span>
        <hr class="flex-grow border-gray-300" />
      </div>

      <p class="text-gray-400 text-center">Demo Credentials</p>
      <div class="bg-gray-300 max-auto text-center py-6 mt-2 rounded-xl">
        <p><span class="font-bold">Username:</span> admin</p>
        <p><span class="font-bold">Password:</span> admin123</p>
      </div>
    </div>

    <script src="./scripts/login.js"></script>
  </body>
</html>
